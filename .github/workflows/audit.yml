name: "監査: 透明性とセキュリティ (Audit: Transparency and Security)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'projects/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-and-oss:
    name: コード整合性とOSS監査 (Code Integrity and OSS Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: 0. Pre-commit Lint
      run: npm run pre-commit

    - name: 1. ルートディレクトリのクリーンネス確認 (Root Directory Cleanliness)
      run: python scripts/check_root_files.py

    - name: 2. プロジェクトポリシー確認 (Project Policy Guard)
      run: python scripts/verify_project_policies.py

    - name: 3. バージョンの一貫性確認 (Version Consistency)
      run: python scripts/check_version.py

    - name: 4. 外部OSS依存関係なしの確認 (No Production Dependencies)
      run: python scripts/audit_production_dependencies.py

    - name: 5. カバレッジ計測とバッジ更新 (Coverage Measurement and Badge Update)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        npm test -- --coverage
        python scripts/update_coverage_badge.py
        # カバレッジレポートをWeb公開用に配置 (コミットはしない)
        rm -rf projects/web/coverage
        mkdir -p projects/web/coverage
        cp -r coverage/lcov-report/* projects/web/coverage/

    - name: Commit and Push README changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git diff-index --quiet HEAD || git commit -m "docs: update coverage badge [skip ci]"
        git push

    - name: Upload artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'projects/web'

  deploy:
    name: GitHub Pagesへデプロイ (Deploy to GitHub Pages)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: integrity-and-oss
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
