<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>使い方 - TidyGroup-Solo</title>
    <style>
      :root {
        --md-sys-color-primary: #386a20;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-surface: #fdfbff;
        --md-sys-color-on-surface: #1a1c1e;
        --md-sys-color-outline: #73777f;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        line-height: 1.6;
      }
      header {
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--md-sys-color-outline);
      }
      .logo {
        font-weight: bold;
        font-size: 1.2rem;
        text-decoration: none;
        color: var(--md-sys-color-on-surface);
      }
      main {
        max-width: 800px;
        margin: 4rem auto;
        padding: 0 2rem;
      }
      h1 {
        border-bottom: 2px solid var(--md-sys-color-primary);
        display: inline-block;
      }
      footer {
        text-align: center;
        padding: 2rem;
        border-top: 1px solid var(--md-sys-color-outline);
        color: var(--md-sys-color-outline);
      }
    </style>
  </head>
  <body data-page="usage">
    <header>
      <a href="index.html" class="logo"> TidyGroup-Solo </a>
    </header>
    <main>
      <h1 data-i18n="usageTitle">使い方</h1>
      <section>
        <h2>1. サイドパネルを開く</h2>
        <p>ツールバーのアイコンをクリックして、TidyGroup-Soloのサイドパネルを開きます。</p>
      </section>
      <section>
        <h2>2. 健康診断（Dashboard）</h2>
        <p>サイドパネルで、現在のタブグループの重複状況や「冬眠中」のグループ数を確認します。</p>
      </section>
      <section>
        <h2>3. 整理の実行</h2>
        <p>「手術室（メインパネル）」を開き、スマート・マージや一括クレンジングを実行してタブグループを整理します。</p>
      </section>
      <a href="index.html" data-i18n="backToHome">ホームに戻る</a>
    </main>
    <footer>
      <p>&copy; 2026 TidyGroup-Solo. All rights reserved.</p>
    </footer>
    <script src="i18n.js"></script>
  </body>
</html>
